<!DOCTYPE html>
<html>
<head>
    <title>I'm Sorry</title>
</head>

<body style="margin:0; padding:0; background: linear-gradient(to right, #ff9a9e, #fad0c4); height:100vh; display:flex; justify-content:center; align-items:center; font-family: Arial, sans-serif; text-align:center; overflow:hidden;">

    <div style="background-color:#ff6f91; padding:40px; width:420px; border-radius:15px; box-shadow:0 10px 25px rgba(0,0,0,0.2); position:relative;">
        
       <img src="yourimagename.jpg" alt="Image" style="width:150px; height:150px; object-fit:cover; border-radius:50%; margin-bottom:20px;">

        <h1 style="color:white; margin:0 0 10px 0;">
            I'm Sorry Sonakshi
        </h1>

        <p style="color:white; font-size:18px; margin-bottom:20px;">
            I didn’t mean to hurt you.
        </p>

        <button onclick="showQuestion()" 
                style="padding:10px 20px; border:none; border-radius:8px; cursor:pointer; font-size:15px; margin-bottom:20px;">
            Click Here
        </button>

        <div id="questionBox" style="display:none; margin-top:20px;">
            <p style="color:white; font-size:18px;">Do you forgive me?</p>

            <button onclick="forgiven()" 
                    style="padding:8px 18px; border:none; border-radius:8px; cursor:pointer; margin-right:10px;">
                Yes
            </button>

            <button id="noBtn"
                    style="padding:8px 18px; border:none; border-radius:8px; cursor:pointer; position:absolute;">
                No
            </button>
        </div>

        <p id="result" style="color:white; font-size:18px; margin-top:20px;"></p>

    </div>

    <script>
        function showQuestion() {
            document.getElementById("questionBox").style.display = "block";
        }

        function forgiven() {
            document.getElementById("result").innerHTML = "Thank you ❤️";
        }

        var noBtn = document.getElementById("noBtn");

        noBtn.addEventListener("mouseover", function() {
            var x = Math.floor(Math.random() * 300);
            var y = Math.floor(Math.random() * 200);
            noBtn.style.left = x + "px";
            noBtn.style.top = y + "px";
        });
    </script>

</body>
</html>
